<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSI PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#070b14;
color:#fff;
min-height:100vh;
padding:14px;
}

.app{
max-width:420px;
margin:auto;
padding-bottom:90px;
}

.card{
background:linear-gradient(180deg,#101826,#0b1220);
border:1px solid rgba(255,255,255,.05);
border-radius:24px;
padding:16px;
box-shadow:0 0 20px rgba(0,150,255,.08);
margin-bottom:14px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.logo{
font-size:28px;
font-weight:900;
letter-spacing:1px;
}

.logo span{
color:#6f6cff;
}

.vip{
background:linear-gradient(90deg,#f4c95d,#d7a417);
padding:8px 14px;
border-radius:50px;
color:#111;
font-weight:900;
font-size:14px;
}

.hero{
display:flex;
gap:12px;
align-items:center;
}

.hero img{
width:120px;
border-radius:20px;
}

.heroText h1{
font-size:28px;
line-height:1.3;
margin-bottom:8px;
}

.heroText p{
color:#a8b0c2;
font-size:14px;
}

.badges{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.badge{
background:#0d1524;
padding:10px;
border-radius:16px;
text-align:center;
font-size:12px;
color:#c6d0e3;
}

.section-title{
font-size:20px;
font-weight:900;
margin-bottom:14px;
}

.input{
width:100%;
background:#0d1524;
border:none;
padding:16px;
border-radius:18px;
color:#fff;
font-size:16px;
margin-bottom:12px;
outline:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.btn{
border:none;
padding:15px;
border-radius:18px;
font-weight:900;
font-size:16px;
cursor:pointer;
background:#121c2c;
color:#fff;
}

.btn.active{
background:linear-gradient(90deg,#287bff,#7d38ff);
}

.fps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:12px;
}

.main-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#24a7ff,#7d38ff);
font-size:20px;
font-weight:900;
color:#fff;
cursor:pointer;
margin-top:6px;
}

.result{
display:none;
margin-top:14px;
}

.code-box{
background:#09111f;
padding:16px;
border-radius:18px;
text-align:center;
font-size:23px;
font-weight:900;
color:#31d8ff;
word-break:break-all;
margin-bottom:10px;
}

.copy{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#18263c;
color:#fff;
font-weight:900;
cursor:pointer;
}

.library-list{
display:grid;
gap:12px;
}

.player{
display:flex;
gap:12px;
align-items:center;
background:#0d1524;
padding:12px;
border-radius:18px;
}

.player img{
width:58px;
height:58px;
border-radius:50%;
object-fit:cover;
}

.player-info{
flex:1;
}

.player-info h3{
font-size:16px;
margin-bottom:4px;
}

.player-info p{
font-size:13px;
color:#9ba6bc;
}

.small-btn{
background:#2a5cff;
border:none;
padding:10px 14px;
border-radius:12px;
color:#fff;
font-weight:700;
cursor:pointer;
}

.settings-item{
background:#0d1524;
padding:15px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0a101b;
padding:10px;
display:flex;
justify-content:center;
}

.nav-wrap{
width:100%;
max-width:420px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.nav-btn{
background:#111a28;
border:none;
color:#9ba6bc;
padding:14px;
border-radius:18px;
font-weight:900;
cursor:pointer;
}

.nav-btn.active{
background:linear-gradient(90deg,#287bff,#7d38ff);
color:#fff;
}

.page{
display:none;
}

.page.active{
display:block;
}
</style>
</head>
<body>

<div class="app">

<!-- الرئيسية -->
<div class="page active" id="home">

<div class="topbar">
<div class="logo">SENSI <span>PRO</span></div>
<div class="vip">VIP</div>
</div>

<div class="card">
<div class="hero">
<div class="heroText">
<h1>صانع الحساسية الذكي PUBG</h1>
<p>أنشئ كود حساسية احترافي حسب جهازك</p>
</div>
<img src="https://i.imgur.com/V7aQG9F.png">
</div>

<div class="badges">
<div class="badge">ذكاء متطور</div>
<div class="badge">آمن 100%</div>
<div class="badge">مخصص لك</div>
</div>
</div>

<div class="card">
<div class="section-title">إعدادات جهازك</div>

<input class="input" id="device" placeholder="مثال: iPhone 15 Pro Max">

<div class="row">
<button class="btn os active" onclick="pick('os',this)">Android</button>
<button class="btn os" onclick="pick('os',this)">iOS</button>
</div>

<div class="fps">
<button class="btn fr">40</button>
<button class="btn fr active">60</button>
<button class="btn fr">90</button>
<button class="btn fr">120</button>
</div>

<button class="main-btn" onclick="generateCode()">إنشاء كود الحساسية</button>

<div class="result" id="resultBox">
<div class="code-box" id="codeText"></div>
<button class="copy" onclick="copyCode()">نسخ الكود</button>
</div>

</div>
</div>

<!-- المكتبة -->
<div class="page" id="library">

<div class="topbar">
<div class="logo">المكتبة</div>
</div>

<div class="card">
<div class="section-title">مكتبة المشاهير الذهبية</div>

<div class="library-list">

<div class="player">
<img src="https://i.imgur.com/W4KX9xw.png">
<div class="player-info">
<h3>مليون روسيس</h3>
<p>Android • 4 أصابع</p>
</div>
<button class="small-btn" onclick="alert('4567-8901-2345')">نسخ</button>
</div>

<div class="player">
<img src="https://i.imgur.com/W4KX9xw.png">
<div class="player-info">
<h3>ابن سوريا</h3>
<p>iPhone • 5 أصابع</p>
</div>
<button class="small-btn" onclick="alert('8811-2345-6789')">نسخ</button>
</div>

</div>
</div>
</div>

<!-- الاعدادات -->
<div class="page" id="settings">

<div class="topbar">
<div class="logo">الإعدادات</div>
</div>

<div class="card">
<div class="settings-item">
<span>الوضع الليلي</span>
<span>ON</span>
</div>

<div class="settings-item">
<span>الإشعارات</span>
<span>ON</span>
</div>

<div class="settings-item">
<span>الإصدار</span>
<span>2026</span>
</div>

<div class="settings-item">
<span>الدعم</span>
<span>@YourName</span>
</div>

</div>
</div>

</div>

<!-- الناف بار -->
<div class="bottom-nav">
<div class="nav-wrap">
<button class="nav-btn active" onclick="openPage('home',this)">الرئيسية</button>
<button class="nav-btn" onclick="openPage('library',this)">المكتبة</button>
<button class="nav-btn" onclick="openPage('settings',this)">الإعدادات</button>
</div>
</div>

<script>
let lastCode="";

function pick(cls,el){
document.querySelectorAll('.'+cls).forEach(x=>x.classList.remove('active'));
el.classList.add('active');
}

document.querySelectorAll('.fr').forEach(btn=>{
btn.onclick=function(){
document.querySelectorAll('.fr').forEach(x=>x.classList.remove('active'));
this.classList.add('active');
}
});

function generateCode(){
let arr=[
"7048-7423-1526-2314",
"5538-1477-9832-1004",
"8274-2044-6144-9233",
"9901-7311-5550-1177",
"4367-1110-7771-9001"
];

let code="";
do{
code=arr[Math.floor(Math.random()*arr.length)];
}while(code===lastCode);

lastCode=code;
document.getElementById("resultBox").style.display="block";
document.getElementById("codeText").innerText=code;
}

function copyCode(){
let t=document.getElementById("codeText").innerText;
navigator.clipboard.writeText(t);
alert("تم نسخ الكود");
}

function openPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
btn.classList.add('active');
}
</script>

</body>
</html>
