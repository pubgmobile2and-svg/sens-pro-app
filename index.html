<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSY PRO VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1113;
            --card-bg: #1c1f26;
            --accent-gold: linear-gradient(145deg, #d4af37, #b8860b);
            --gold-text: #d4af37;
            --gray-text: #8e9297;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px 15px 100px;
            overflow-x: hidden;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo-area h1 { font-size: 1.2rem; margin: 0; font-weight: 900; }
        .logo-area p { font-size: 0.75rem; color: var(--gray-text); margin: 0; }
        .vip-tag { background: var(--accent-gold); color: black; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; }

        /* Main Sections Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .main-action-card {
            background: linear-gradient(145deg, #23272f, #1c1f26);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
        }
        .main-action-card h3 { font-size: 0.9rem; margin: 10px 0 5px; color: var(--gold-text); }
        .main-action-card p { font-size: 0.65rem; color: var(--gray-text); margin: 0; line-height: 1.3; }
        .card-icon { font-size: 2rem; }

        /* Section Title */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            color: var(--gold-text);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* Celebrity Library Card */
        .celeb-item {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .celeb-info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .profile-box { display: flex; align-items: center; gap: 12px; }
        .profile-box img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold-text); object-fit: cover; }
        .name-meta h4 { margin: 0; font-size: 1rem; font-weight: 900; }
        .status-dot { color: #4caf50; font-size: 0.65rem; display: flex; align-items: center; gap: 4px; }

        /* Code Copy Area */
        .copy-container {
            background: #121417;
            border-radius: 15px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-val { font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: 1px; font-size: 1rem; }
        .btn-copy {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.7rem;
            color: var(--gray-text);
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(28, 31, 38, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 calc(15px + var(--safe-area-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        .nav-link { text-align: center; color: var(--gray-text); text-decoration: none; font-size: 0.7rem; font-weight: 600; }
        .nav-link.active { color: var(--gold-text); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <h1>سينسي برو - SENSY PRO</h1>
            <p>دليل الحساسية الأفضل</p>
        </div>
        <div class="vip-tag">⭐ VIP</div>
    </header>

    <div class="grid-container">
        <div class="main-action-card">
            <span class="vip-tag" style="position:absolute; top:8px; right:8px; font-size:0.5rem; padding: 2px 6px;">VIP</span>
            <div class="card-icon">🦾</div>
            <h3>مولد الحساسية</h3>
            <p>أنشئ إعدادات مثالية مخصصة لأسلوب لعبك</p>
        </div>
        <div class="main-action-card">
            <span class="vip-tag" style="position:absolute; top:8px; right:8px; font-size:0.5rem; padding: 2px 6px;">VIP</span>
            <div class="card-icon">🗺️</div>
            <h3>استراتيجية الارتداد</h3>
            <p>دليل عملي لتسديدات أكثر ثباتاً</p>
        </div>
    </div>

    <div class="section-header">🏆 مكتبة المشاهير الذهبية</div>

    <div id="celeb-list">
        <p style="text-align: center; color: var(--gray-text);">جاري تحميل المحتوى الذهبي...</p>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-link"><span class="nav-icon">⚙️</span>الإعدادات</a>
        <a href="#" class="nav-link"><span class="nav-icon">⭐</span>المكتبة</a>
        <a href="#" class="nav-link active"><span class="nav-icon">🏠</span>الرئيسية</a>
    </nav>

    <script>
        // رابط الشيت الخاص بك (CSV)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRvEMgQkRx9FutTjTlG0_kv1WKg-b31QM1LibOvpbIFwoWEWgorHoGXiLEifh5a4bNwGXIUs0YHs3e/pub?gid=1626084024&output=csv';

        async function fetchSensyData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // تجاهل الهيدر
                const container = document.getElementById('celeb-list');
                container.innerHTML = '';

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length < 6) return;

                    const [name, img, code, device, style, rating, count] = columns;

                    container.innerHTML += `
                        <div class="celeb-item">
                            <div class="celeb-info-row">
                                <div class="profile-box">
                                    <img src="${img.trim()}" alt="${name}">
                                    <div class="name-meta">
                                        <h4>${name}</h4>
                                        <div style="font-size: 0.65rem; color: var(--gray-text); margin-top: 2px;">
                                            ${device} | ${style}
                                        </div>
                                    </div>
                                </div>
                                <div class="status-dot">● متاح الآن</div>
                            </div>
                            <div class="copy-container">
                                <span class="code-val" id="code-${name.replace(/\s/g, '')}">${code}</span>
                                <button class="btn-copy" onclick="copyCode('code-${name.replace(/\s/g, '')}')">نسخ الكود</button>
                            </div>
                            <div class="stats-row">
                                <span>⭐ ${rating} / 5.0</span>
                                <span>📥 ${count}k نسخ</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('celeb-list').innerHTML = '<p style="color:red; text-align:center;">حدث خطأ في جلب البيانات</p>';
            }
        }

        function copyCode(id) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert('تم نسخ الكود الذهبي بنجاح!');
            });
        }

        window.onload = fetchSensyData;
    </script>
</body>
</html>
